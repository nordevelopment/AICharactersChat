<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Character Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    
    <!-- ====================== СОВРЕМЕННЫЙ КАСТОМНЫЙ CSS ====================== -->
    <style>
        :root {
            /* Основная цветовая палитра 2026 (cyber-neon + glassmorphism) */
            --bg: #0a0a1f;
            --glass: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(0, 247, 255, 0.25);
            --neon-cyan: #00f7ff;
            --neon-purple: #c300ff;
            --text: #e0f7ff;
            --text-muted: #94a3c0;
            --message-ai: rgba(30, 41, 70, 0.92);
            --message-user: linear-gradient(135deg, #00d4ff, #00ffaa);
        }

        * {
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Navbar — glass + neon */
        .navbar-cyber {
            background: rgba(10, 10, 31, 0.92) !important;
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px -10px var(--neon-cyan);
        }
        .navbar-brand-cyber {
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-link-cyber {
            position: relative;
        }
        .nav-link-cyber.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 6px;
            height: 6px;
            background: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--neon-cyan);
            transform: translateX(-50%);
        }

        /* Wrapper + sidebar glassmorphism */
        .wrapper {
            display: flex;
            height: calc(100vh - 56px);
        }
        .sidebar {
            width: 280px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            box-shadow: 4px 0 30px -10px rgba(0, 247, 255, 0.15);
            z-index: 100;
        }
        .sidebar-header {
            padding: 1.5rem 1.25rem;
            border-bottom: 1px solid var(--glass-border);
        }
        .sidebar-header h4 {
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            color: var(--neon-cyan);
        }
        .manage-btn {
            background: rgba(0, 247, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-weight: 600;
        }
        .manage-btn:hover {
            background: var(--neon-cyan);
            color: #0a0a1f;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .character-item {
            padding: 12px 16px;
            margin: 4px 8px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .character-item:hover {
            background: rgba(0, 247, 255, 0.12);
            transform: translateX(4px);
        }
        .character-item.active {
            background: linear-gradient(90deg, rgba(195, 0, 255, 0.2), rgba(0, 247, 255, 0.2));
            box-shadow: 0 0 0 3px rgba(0, 247, 255, 0.3);
        }
        .avatar-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
            color: #0a0a1f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        /* Основная область чата */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 20%, rgba(0, 247, 255, 0.08) 0%, transparent 60%);
        }

        /* Header чата */
        .chat-header {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 20px -8px var(--neon-cyan);
        }
        #character-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            object-fit: cover;
        }
        .chat-header p {
            font-weight: 600;
            font-size: 1.25rem;
            margin: 0;
            letter-spacing: -0.3px;
        }

        /* Окно сообщений */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 28px 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
            background: transparent;
        }
        #chat-window::-webkit-scrollbar {
            width: 8px;
        }
        #chat-window::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 20px;
            opacity: 0.3;
        }

        /* Сообщения — современные bubbles */
        .message {
            display: flex;
            max-width: 78%;
            gap: 12px;
            position: relative;
        }
        .ai-message {
            align-self: flex-start;
        }
        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message .content {
            padding: 14px 20px;
            border-radius: 22px;
            font-size: 1.05rem;
            line-height: 1.45;
            box-shadow: 0 4px 15px -4px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        .ai-message .content {
            background: var(--message-ai);
            border-bottom-left-radius: 6px;
            color: var(--text);
        }
        .user-message .content {
            background: var(--message-user);
            color: #0a0a1f;
            border-bottom-right-radius: 6px;
            font-weight: 500;
        }

        /* Аватар только у AI-сообщений */
        .ai-message::before {
            content: '';
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #0a0a1f;
            box-shadow: 0 0 12px var(--neon-cyan);
        }

        /* Изображения в чате */
        .chat-img {
            max-width: 100%;
            border-radius: 18px;
            border: 2px solid rgba(0, 247, 255, 0.3);
            box-shadow: 0 8px 25px -8px rgba(0, 247, 255, 0.4);
        }

        /* Индикатор печати */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 14px 20px;
            background: var(--message-ai);
            border-radius: 22px;
            width: fit-content;
            align-self: flex-start;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--neon-cyan);
            border-radius: 50%;
            animation: typingBounce 1.2s infinite;
            box-shadow: 0 0 8px var(--neon-cyan);
        }
        .typing-dot:nth-child(2) { animation-delay: 150ms; }
        .typing-dot:nth-child(3) { animation-delay: 300ms; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        /* Область ввода — glass + neon */
        .chat-input-area {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            padding: 16px 24px;
            box-shadow: 0 -4px 25px -10px var(--neon-cyan);
        }
        .input-wrapper {
            display: flex;
            align-items: end;
            background: rgba(10, 15, 35, 0.7);
            border-radius: 9999px;
            padding: 6px 12px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 0 3px rgba(0, 247, 255, 0.15);
        }
        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            max-height: 200px;
            font-size: 1.1rem;
            line-height: 1.4;
            padding: 12px 16px;
            color: var(--text);
        }
        .message-input::placeholder {
            color: var(--text-muted);
        }
        .send-button {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px var(--neon-cyan);
        }
        .send-button:hover {
            transform: scale(1.08);
            box-shadow: 0 0 35px 8px var(--neon-cyan);
        }

        /* Предпросмотр изображения */
        #image-preview-container {
            background: rgba(15, 23, 42, 0.95) !important;
            border-top: 1px solid var(--neon-cyan) !important;
        }

        /* Модальное окно */
        .modal-cyber .modal-content {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgb(0 247 255);
        }
        .modal-header {
            border-bottom: 1px solid var(--glass-border);
        }

        /* Дополнительные улучшения */
        .dropdown-menu-cyber {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
        }
        .dropdown-item-cyber:hover {
            background: rgba(0, 247, 255, 0.15);
        }

        /* Анимация появления сообщений */
        .message {
            animation: messagePop 0.3s ease forwards;
        }
        @keyframes messagePop {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="has-navbar" x-data="{ ...chatApp(), ...userProfileApp(), prefix: window.APP_CONFIG?.appPrefix || '' }"
    x-init="init()" x-cloak>

    <!-- Navbar (оставлен почти без изменений, но теперь ещё красивее) -->
    <nav class="navbar navbar-expand-lg navbar-cyber">
        <div class="container-fluid">
            <a class="navbar-brand navbar-brand-cyber" :href="prefix + '/chat'">AI Character Chat</a>
            <button type="button" id="chat-sidebar-toggle" class="d-lg-none btn btn-outline-info me-2"
                @click="sidebarActive = !sidebarActive">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi-list" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/>
                </svg>
            </button>
            <div class="navbar-collapse" id="navbarNav">
                <div class="dropdown ms-auto">
                    <div class="user-nav-summary dropdown-toggle" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <div class="profile-avatar-sm" x-text="user.display_name ? user.display_name[0].toUpperCase() : 'U'"></div>
                        <span>Меню</span>
                    </div>
                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-cyber" aria-labelledby="userDropdown">
                        <li><a class="dropdown-item dropdown-item-cyber active" :href="prefix + '/chat'">Чат</a></li>
                        <li><a class="dropdown-item dropdown-item-cyber" :href="prefix + '/characters'">Персонажи</a></li>
                        <li><a class="dropdown-item dropdown-item-cyber" :href="prefix + '/image-gen'">Генерация изображений</a></li>
                        <li><hr class="dropdown-divider border-secondary"></li>
                        <li><a class="dropdown-item dropdown-item-cyber" href="#" @click.prevent="openProfileModal()">Настройки профиля</a></li>
                        <li><a class="dropdown-item dropdown-item-cyber text-danger" href="#" @click.prevent="logout()">Выйти</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="wrapper">
        <!-- Mobile overlay -->
        <div class="sidebar-overlay" x-show="sidebarActive" x-transition.opacity @click="sidebarActive = false" x-cloak></div>

        <!-- Sidebar -->
        <div class="sidebar" id="chat-sidebar" :class="{ 'active': sidebarActive }">
            <div class="sidebar-header">
                <h4 class="mb-3">Персонажи</h4>
                <a :href="prefix + '/characters'" class="btn btn-sm w-100 manage-btn">Управлять персонажами</a>
            </div>
            <div class="character-list px-2 py-2">
                <template x-for="char in characters" :key="char.id">
                    <div class="character-item" :class="{ 'active': currentCharacter?.id === char.id }" @click="selectCharacter(char)">
                        <template x-if="char.avatar">
                            <img :src="char.avatar" style="width:34px;height:34px;border-radius:50%;object-fit:cover;">
                        </template>
                        <template x-if="!char.avatar">
                            <div class="avatar-icon" x-text="char.name[0]"></div>
                        </template>
                        <div style="flex-grow:1; overflow:hidden;">
                            <span class="character-name fw-semibold" x-text="char.name"></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Главная область чата -->
        <div class="chat-container">
            <!-- Header -->
            <div class="chat-header">
                <template x-if="currentCharacter?.avatar">
                    <img :src="currentCharacter?.avatar" id="character-avatar" alt="">
                </template>
                <template x-if="!currentCharacter?.avatar">
                    <div class="avatar-icon" style="width:42px;height:42px;font-size:1.4rem;" x-text="currentCharacter?.name?.[0]?.toUpperCase() ?? '?'"></div>
                </template>
                <div style="flex-grow:1;">
                    <p class="h5 m-0" x-text="currentCharacter ? currentCharacter.name : 'Выберите персонажа'"></p>
                    <small class="text-muted" x-show="currentCharacter">онлайн • всегда готов к разговору</small>
                </div>
                <button @click="clearHistory()" class="btn btn-sm btn-outline-danger" title="Очистить историю">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5Zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5Zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6Z"/>
                        <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1ZM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118ZM2.5 3h11V2h-11v1Z"/>
                    </svg>
                </button>
            </div>

            <!-- Окно чата -->
            <div id="chat-window" x-ref="chatWindow">
                <template x-for="(msg, index) in messages" :key="index">
                    <div class="message" :class="msg.role === 'user' ? 'user-message' : 'ai-message'">
                        <template x-if="msg.image">
                            <div class="mb-3"><img :src="msg.image" class="chat-img"></div>
                        </template>
                        <div class="content" x-html="renderMarkdown(msg.content)"></div>
                    </div>
                </template>

                <!-- Typing -->
                <div class="message ai-message" x-show="isTyping">
                    <template x-if="typingReasoning">
                        <details class="reasoning-details mb-2" open>
                            <summary class="text-muted small" style="cursor:pointer">Размышляет...</summary>
                            <div class="content text-muted small mt-1" style="border-left: 3px solid var(--neon-cyan); padding-left: 12px;" x-html="renderMarkdown(typingReasoning)"></div>
                        </details>
                    </template>
                    <div class="content" x-show="typingMessage" x-html="renderMarkdown(typingMessage)"></div>
                    <div class="typing-indicator" x-show="!typingMessage && !typingReasoning">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            </div>

            <!-- Предпросмотр изображения -->
            <div x-show="selectedImage" id="image-preview-container" class="px-3 py-2">
                <div class="position-relative d-inline-block">
                    <img id="image-preview" class="chat-img" :src="selectedImage" style="max-height:160px;">
                    <button @click="clearImage()" class="btn btn-sm btn-danger position-absolute top-0 end-0 rounded-circle" style="transform: translate(40%, -40%); padding: 2px 8px; font-size: 1.1rem;">×</button>
                </div>
            </div>

            <!-- Поле ввода -->
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <label for="image-input" class="btn btn-link text-muted p-0 me-3 mb-0" style="cursor:pointer;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/>
                            <path d="M1.5 2A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-13zm13 1a.5.5 0 0 1 .5.5v6l-3.775-1.947a.5.5 0 0 0-.577.093L7.5 10.5 4.775 8.053a.5.5 0 0 0-.577-.093L1 10.5V4.5a.5.5 0 0 1 .5-.5h13z"/>
                        </svg>
                        <input type="file" id="image-input" x-ref="imageInput" @change="handleImage" accept="image/*" style="display:none;">
                    </label>
                    <textarea x-model="newMessage" class="message-input"
                        @keydown.enter.prevent="if(!$event.shiftKey && !$event.ctrlKey) sendMessage()"
                        placeholder="Напишите сообщение..." autocomplete="off" rows="1"
                        :style="`height: ${Math.min(newMessage.split('\n').length * 24 + 16, 200)}px`"></textarea>
                    <button class="send-button" @click="sendMessage()" :disabled="!currentCharacter || isTyping">
                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="#0a0a1f" viewBox="0 0 16 16">
                            <path d="M15.854.146a.5.5 0 0 1 .11.638l-5 10a.5.5 0 0 1-.9.1L6.5 8.707 1.146 13.854a.5.5 0 0 1-.707-.707l6-6a.5.5 0 0 1 .707 0L10 8.293 14.146.146a.5.5 0 0 1 .708-.082z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Profile Modal (улучшенный) -->
    <div class="modal fade modal-cyber" id="profileModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Редактировать профиль</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form @submit.prevent="updateProfile()">
                        <div class="mb-3">
                            <label class="form-label text-dim">Отображаемое имя</label>
                            <input type="text" x-model="profileForm.display_name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-dim">Новый пароль (необязательно)</label>
                            <input type="password" x-model="profileForm.password" class="form-control" placeholder="••••••••">
                            <small class="text-muted">Оставьте пустым, чтобы сохранить текущий</small>
                        </div>
                        <div x-show="profileMessage" :class="profileMessage?.type === 'error' ? 'alert alert-danger' : 'alert alert-success'" x-text="profileMessage?.text"></div>
                        <button type="submit" class="btn w-100" style="background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); color:#0a0a1f; font-weight:700;" :disabled="profileLoading">
                            <span x-show="!profileLoading">Сохранить изменения</span>
                            <span x-show="profileLoading">Сохранение...</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="public/app_userprofile.js?v=3"></script>
    <script src="public/app_chat.js?v=12"></script>
</body>
</html>
