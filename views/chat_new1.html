<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Character Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ===== Токены дизайна ===== */
        :root {
            --bg-base: #08090c;
            --bg-primary: #0c0e13;
            --bg-surface: #11141b;
            --bg-elevated: #181c26;
            --bg-hover: #1f2433;
            --bg-active: #252a3a;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-default: rgba(255, 255, 255, 0.1);
            --border-strong: rgba(255, 255, 255, 0.15);
            --text-primary: #ecedf0;
            --text-secondary: #b0b4c0;
            --text-muted: #6b7084;
            --text-dim: #454a5e;
            --accent: #2dd4bf;
            --accent-hover: #14b8a6;
            --accent-soft: rgba(45, 212, 191, 0.08);
            --accent-muted: rgba(45, 212, 191, 0.14);
            --accent-glow: rgba(45, 212, 191, 0.25);
            --danger: #f87171;
            --danger-soft: rgba(248, 113, 113, 0.1);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 20px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
            --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --sidebar-width: 290px;
            --navbar-height: 54px;
            --transition-fast: 0.15s ease;
            --transition-base: 0.25s ease;
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --bs-secondary-color: #6a7475;
        }

        /* ===== Сброс и база ===== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        [x-cloak] { display: none !important; }

        html {
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.6;
            overflow: hidden;
            height: 100vh;
        }

        ::selection {
            background: var(--accent-muted);
            color: var(--text-primary);
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); }

        /* ===== Скроллбар ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        /* ===== Навбар ===== */
        .navbar-cyber {
            height: var(--navbar-height);
            background: rgba(12, 14, 19, 0.82);
            backdrop-filter: blur(24px) saturate(1.2);
            -webkit-backdrop-filter: blur(24px) saturate(1.2);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0 16px;
            position: relative;
            z-index: 1050;
        }
        .navbar-cyber::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--accent-glow) 50%, transparent 100%);
            opacity: 0.4;
            pointer-events: none;
        }

        .navbar-brand-cyber {
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -0.02em;
            color: var(--text-primary) !important;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .navbar-brand-cyber::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            flex-shrink: 0;
        }

        /* Кнопка бургер */
        #chat-sidebar-toggle {
            border-color: var(--border-default) !important;
            color: var(--text-secondary) !important;
            border-radius: var(--radius-sm);
            padding: 6px 8px;
            transition: all var(--transition-fast);
        }
        #chat-sidebar-toggle:hover {
            border-color: var(--accent) !important;
            color: var(--accent) !important;
            background: var(--accent-soft);
        }

        /* Навбар: юзер-блок */
        .user-nav-summary {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            transition: background var(--transition-fast);
        }
        .user-nav-summary:hover {
            background: var(--bg-hover);
        }
        .user-nav-summary span {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .profile-avatar-sm {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-muted), var(--accent-soft));
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
            border: 1.5px solid var(--border-default);
        }

        /* Дропдаун */
        .dropdown-menu-cyber {
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            padding: 6px;
            min-width: 200px;
            margin-top: 8px !important;
            animation: dropdownIn 0.2s ease-out;
        }
        @keyframes dropdownIn {
            from { opacity: 0; transform: translateY(-8px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .dropdown-item-cyber {
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            font-size: 0.875rem;
            transition: all var(--transition-fast);
        }
        .dropdown-item-cyber:hover,
        .dropdown-item-cyber:focus {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .dropdown-item-cyber.text-danger {
            color: var(--danger);
        }
        .dropdown-item-cyber.text-danger:hover {
            background: var(--danger-soft);
            color: var(--danger);
        }

        .nav-link-cyber {
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            font-size: 0.875rem;
            transition: all var(--transition-fast);
        }
        .nav-link-cyber:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .nav-link-cyber.active {
            color: var(--accent);
            background: var(--accent-soft);
        }

        .dropdown-menu-cyber .dropdown-divider {
            border-color: var(--border-subtle);
            margin: 4px 0;
        }

        /* ===== Основной лейаут ===== */
        .has-navbar { }

        .has-navbar .wrapper {
            height: calc(100vh - 66px);
        }

        .wrapper {
            display: flex;
            height: calc(100vh - var(--navbar-height));
            position: relative;
        }

    /* .wrapper {
        display: flex;
        height: 100vh;
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
    } */

        /* ===== Оверлей сайдбара (мобильный) ===== */
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            top: var(--navbar-height);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1035;
        }

        /* ===== Сайдбар ===== */
        .sidebar {
            width: var(--sidebar-width);
            flex-shrink: 0;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform var(--transition-smooth);
        }

        .sidebar-header {
            padding: 20px 16px 12px;
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
        }
        .sidebar-header h4 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .manage-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 500;
            padding: 7px 12px;
            transition: all var(--transition-fast);
        }
        .manage-btn:hover {
            background: var(--bg-hover);
            border-color: var(--border-strong);
            color: var(--text-primary);
        }

        .character-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .character-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            border: 1px solid transparent;
            margin-bottom: 2px;
            position: relative;
        }
        .character-item:hover {
            background: var(--bg-hover);
        }
        .character-item.active {
            background: var(--accent-soft);
            border-color: rgba(45, 212, 191, 0.12);
        }
        .character-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 60%;
            background: var(--accent);
            border-radius: 0 2px 2px 0;
        }

        .avatar-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.78rem;
            flex-shrink: 0;
            margin-right: 10px;
            transition: all var(--transition-fast);
        }
        .character-item.active .avatar-icon {
            border-color: rgba(45, 212, 191, 0.3);
            color: var(--accent);
            background: rgba(45, 212, 191, 0.08);
        }

        .character-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            transition: color var(--transition-fast);
        }
        .character-item:hover .character-name { color: var(--text-primary); }
        .character-item.active .character-name { color: var(--text-primary); }

        /* ===== Чат-контейнер ===== */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-primary);
            position: relative;
        }

        /* Хедер чата */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-subtle);
            background: rgba(12, 14, 19, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            flex-shrink: 0;
            min-height: 58px;
        }
        .chat-header .avatar-icon {
            width: 36px;
            height: 36px;
            font-size: 0.9rem;
            margin-right: 0;
            border-color: rgba(45, 212, 191, 0.2);
            color: var(--accent);
            background: var(--accent-soft);
        }
        #character-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(45, 212, 191, 0.2);
            flex-shrink: 0;
        }
        .chat-header .h5 {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text-primary);
        }

        /* Кнопка очистки */
        .chat-header .btn-outline-danger {
            border-color: var(--border-default);
            color: var(--text-muted);
            border-radius: var(--radius-sm);
            padding: 6px 8px;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }
        .chat-header .btn-outline-danger:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: var(--danger-soft);
        }

        /* ===== Окно сообщений ===== */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
            scroll-behavior: smooth;
            position: relative;
        }
        /* Тонкий фоновый паттерн */
        #chat-window::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 15% 85%, rgba(45, 212, 191, 0.025) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 15%, rgba(45, 212, 191, 0.015) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }
        #chat-window > * {
            position: relative;
            z-index: 1;
        }

        /* ===== Сообщения ===== */
        .message {
            padding: 4px 28px;
            margin-bottom: 6px;
            animation: messageIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Сообщения ИИ */
        .ai-message {
            padding-left: 28px;
            padding-right: 28px;
        }
        .ai-message .content {
            color: var(--text-primary);
            font-size: 0.93rem;
            line-height: 1.7;
        }

        /* Сообщения пользователя */
        .user-message {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            padding-left: 28px;
            padding-right: 28px;
        }
        .user-message > .chat-img {
            margin-bottom: 8px;
        }
        .user-message .content {
            background: linear-gradient(135deg, rgba(45, 212, 191, 0.1), rgba(45, 212, 191, 0.05));
            border: 1px solid rgba(45, 212, 191, 0.12);
            border-radius: var(--radius-lg) var(--radius-lg) var(--radius-sm) var(--radius-lg);
            padding: 10px 16px;
            max-width: 72%;
            color: var(--text-primary);
            font-size: 0.93rem;
            line-height: 1.65;
        }

        /* ===== Изображения в чате ===== */
        .chat-img {
            display: inline-block;
        }
        .chat-img img {
            border-radius: var(--radius-md);
            max-width: 320px;
            max-height: 280px;
            object-fit: cover;
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-md);
        }

        /* ===== Контент сообщений (Markdown) ===== */
        .content p {
            margin-bottom: 8px;
        }
        .content p:last-child {
            margin-bottom: 0;
        }
        .content strong {
            font-weight: 600;
            color: var(--text-primary);
        }
        .content em {
            font-style: italic;
            color: var(--text-secondary);
        }
        .content h1, .content h2, .content h3,
        .content h4, .content h5, .content h6 {
            color: var(--text-primary);
            font-weight: 700;
            margin-top: 18px;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
            line-height: 1.3;
        }
        .content h1 { font-size: 1.4rem; }
        .content h2 { font-size: 1.2rem; }
        .content h3 { font-size: 1.05rem; }

        .content ul, .content ol {
            padding-left: 22px;
            margin-bottom: 8px;
        }
        .content li {
            margin-bottom: 4px;
            color: var(--text-secondary);
        }
        .content li::marker {
            color: var(--text-muted);
        }

        .content blockquote {
            border-left: 3px solid var(--accent-muted);
            padding: 8px 16px;
            margin: 10px 0;
            color: var(--text-muted);
            background: var(--accent-soft);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }
        .content blockquote p:last-child { margin-bottom: 0; }

        .content a {
            color: var(--accent);
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 2px;
            transition: color var(--transition-fast);
        }
        .content a:hover { color: var(--accent-hover); }

        .content hr {
            border: none;
            border-top: 1px solid var(--border-subtle);
            margin: 16px 0;
        }

        /* Инлайн код */
        .content code:not(pre code) {
            font-family: var(--font-mono);
            font-size: 0.82em;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            color: var(--accent);
            padding: 2px 7px;
            border-radius: 4px;
        }

        /* Блоки кода */
        .content pre {
            background: var(--bg-base) !important;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 0 !important;
            margin: 12px 0;
            overflow: hidden;
            position: relative;
        }
        .content pre code {
            font-family: var(--font-mono);
            font-size: 0.82rem;
            line-height: 1.65;
            padding: 16px !important;
            display: block;
            overflow-x: auto;
        }
        /* Переопределение highlight.js */
        .hljs {
            background: transparent !important;
            padding: 0 !important;
        }

        /* Таблицы */
        .content table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 0.88rem;
        }
        .content th, .content td {
            border: 1px solid var(--border-subtle);
            padding: 8px 12px;
            text-align: left;
        }
        .content th {
            background: var(--bg-elevated);
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .content td {
            color: var(--text-secondary);
        }

        /* ===== Индикатор набора ===== */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 0;
        }
        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingBounce 1.4s ease-in-out infinite;
        }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.35;
            }
            30% {
                transform: translateY(-7px);
                opacity: 1;
            }
        }

        /* ===== Блок рассуждений (Reasoning) ===== */
        .reasoning-details {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 12px 14px;
            margin-bottom: 8px;
            transition: all var(--transition-fast);
        }
        .reasoning-details:hover {
            border-color: var(--border-default);
        }
        .reasoning-details summary {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color var(--transition-fast);
        }
        .reasoning-details summary::-webkit-details-marker { display: none; }
        .reasoning-details summary::before {
            content: '';
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1.5px solid var(--text-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            transition: all var(--transition-fast);
        }
        .reasoning-details summary::after {
            content: '';
            position: absolute;
            left: 5.5px;
            top: 50%;
            width: 0;
            height: 0;
            border-left: 3px solid var(--text-dim);
            border-top: 3px solid transparent;
            border-bottom: 3px solid transparent;
            transform: translateY(-50%) rotate(0deg);
            transition: transform var(--transition-base);
            margin-left: -2px;
        }
        .reasoning-details[open] summary::after {
            transform: translateY(-50%) rotate(90deg);
        }
        .reasoning-details summary:hover {
            color: var(--text-secondary);
        }
        .reasoning-details summary:hover::before {
            border-color: var(--text-muted);
        }
        .reasoning-details .content {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.65;
        }
        .reasoning-details .content p:last-child { margin-bottom: 0; }

        /* ===== Превью изображения ===== */
        #image-preview-container {
            background: var(--bg-surface);
            border-top: 1px solid var(--border-subtle);
            padding: 10px 24px;
            flex-shrink: 0;
        }
        #image-preview {
            border-radius: var(--radius-md);
            max-height: 100px;
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-sm);
        }
        #image-preview-container .btn-danger {
            width: 22px;
            height: 22px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            border: none;
            background: var(--danger);
            color: #fff;
            box-shadow: var(--shadow-sm);
            line-height: 1;
        }

        /* ===== Область ввода ===== */
        .chat-input-area {
            padding: 14px 20px 18px;
            background: var(--bg-surface);
            border-top: 1px solid var(--border-subtle);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            padding: 6px 6px 6px 12px;
            transition: all var(--transition-base);
            position: relative;
        }
        .input-wrapper:focus-within {
            border-color: rgba(45, 212, 191, 0.35);
            box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.06), 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .input-wrapper .btn-link {
            flex-shrink: 0;
            opacity: 0.5;
            transition: opacity var(--transition-fast);
            padding: 4px;
            border-radius: var(--radius-sm);
        }
        .input-wrapper .btn-link:hover {
            opacity: 1;
            background: var(--bg-hover);
        }
        .input-wrapper .btn-link img {
            width: 22px;
            height: 22px;
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.93rem;
            line-height: 1.55;
            resize: none;
            padding: 6px 0;
            max-height: 200px;
            overflow-y: auto;
        }
        .message-input::placeholder {
            color: var(--text-dim);
        }
        .message-input::-webkit-scrollbar { width: 4px; }
        .message-input::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
        }

        .send-button {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-md);
            border: none;
            background: var(--accent);
            color: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all var(--transition-fast);
            padding: 0;
        }
        .send-button:hover:not(:disabled) {
            background: var(--accent-hover);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: scale(1.05);
        }
        .send-button:active:not(:disabled) {
            transform: scale(0.97);
        }
        .send-button:disabled {
            background: var(--bg-active);
            color: var(--text-dim);
            cursor: not-allowed;
            opacity: 0.5;
        }
        .send-button img {
            width: 20px;
            height: 20px;
            filter: brightness(0);
        }
        .send-button:disabled img {
            filter: brightness(0.4);
        }

        /* ===== Модальное окно профиля ===== */
        .modal-cyber .modal-content {
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg), 0 0 60px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .modal-cyber .modal-header {
            border-bottom: 1px solid var(--border-subtle);
            padding: 20px 24px 16px;
        }
        .modal-cyber .modal-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }
        .modal-cyber .btn-close-white {
            filter: invert(1) grayscale(100%) brightness(0.7);
            opacity: 0.6;
            transition: opacity var(--transition-fast);
        }
        .modal-cyber .btn-close-white:hover { opacity: 1; }

        .modal-cyber .modal-body {
            padding: 20px 24px 24px;
        }
        .modal-cyber .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .text-dim {
            color: var(--text-muted) !important;
        }
        .modal-cyber .form-control {
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            padding: 10px 14px;
            font-size: 0.9rem;
            font-family: var(--font-sans);
            transition: all var(--transition-fast);
        }
        .modal-cyber .form-control:focus {
            background: var(--bg-surface);
            border-color: rgba(45, 212, 191, 0.4);
            box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.08);
            color: var(--text-primary);
        }
        .modal-cyber .form-control::placeholder {
            color: var(--text-dim);
        }
        .modal-cyber small {
            font-size: 0.78rem;
            color: var(--text-dim);
        }

        .btn-cyber {
            background: var(--accent);
            color: var(--bg-base);
            border: none;
            border-radius: var(--radius-sm);
            padding: 10px 20px;
            font-weight: 600;
            font-size: 0.88rem;
            font-family: var(--font-sans);
            transition: all var(--transition-fast);
            cursor: pointer;
        }
        .btn-cyber:hover:not(:disabled) {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px var(--accent-glow);
            color: var(--bg-base);
        }
        .btn-cyber:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal-cyber .alert {
            font-size: 0.82rem;
            border-radius: var(--radius-sm);
            border: none;
            padding: 10px 14px;
        }
        .modal-cyber .alert-success {
            background: rgba(45, 212, 191, 0.1);
            color: var(--accent);
        }
        .modal-cyber .alert-danger {
            background: var(--danger-soft);
            color: var(--danger);
        }

        /* Бэкдроп модалки */
        .modal-backdrop {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* ===== Адаптив ===== */
        @media (max-width: 991.98px) {
            .sidebar {
                position: fixed;
                top: var(--navbar-height);
                left: 0;
                bottom: 0;
                z-index: 1040;
                transform: translateX(-100%);
                box-shadow: var(--shadow-lg);
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .message {
                padding-left: 16px;
                padding-right: 16px;
            }
            .chat-header {
                padding: 10px 16px;
            }
            .chat-input-area {
                padding: 10px 12px 14px;
            }
            .user-message .content {
                max-width: 85%;
            }
        }

        @media (max-width: 575.98px) {
            .user-message .content {
                max-width: 92%;
            }
            .chat-img img {
                max-width: 220px;
                max-height: 200px;
            }
            .navbar-brand-cyber {
                font-size: 0.95rem;
            }
            .user-nav-summary span {
                display: none;
            }
        }

        /* ===== Уважение к reduced-motion ===== */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .message {
                animation: none !important;
            }
        }

        /* ===== Полезные утилиты Bootstrap-переопределения ===== */
        .btn:focus-visible,
        .form-control:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
    </style>
</head>

<body class="has-navbar" x-data="{ ...chatApp(), ...userProfileApp(), prefix: window.APP_CONFIG?.appPrefix || '' }"
    x-init="init()" x-cloak>
    <nav class="navbar navbar-expand-lg navbar-cyber">
        <div class="container-fluid">
            <a class="navbar-brand navbar-brand-cyber" :href="prefix + '/chat'">AI Character Chat</a>
            <button type="button" id="chat-sidebar-toggle" class="d-lg-none btn btn-outline-info me-2"
                @click="sidebarActive = !sidebarActive">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi-list"
                    viewBox="0 0 16 16">
                    <path fill-rule="evenodd"
                        d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z" />
                </svg>
            </button>
            <div class="navbar-collapse" id="navbarNav">
                <div class="dropdown">
                    <div class="user-nav-summary dropdown-toggle" id="userDropdown" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        <div class="profile-avatar-sm"
                            x-text="user.display_name ? user.display_name[0].toUpperCase() : 'U'"></div>
                        <span>Menu</span>
                    </div>

                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-cyber" aria-labelledby="userDropdown">
                        <li class="nav-item">
                            <a class="nav-link nav-link-cyber active" :href="prefix + '/chat'">Chat</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link nav-link-cyber" :href="prefix + '/characters'">Characters</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link nav-link-cyber" :href="prefix + '/image-gen'">Image Gen</a>
                        </li>
                        <li><a class="dropdown-item dropdown-item-cyber" href="#"
                                @click.prevent="openProfileModal()">Profile Settings</a></li>
                        <li>
                            <hr class="dropdown-divider border-secondary">
                        </li>
                        <li><a class="dropdown-item dropdown-item-cyber text-danger" href="#"
                                @click.prevent="logout()">Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="wrapper">
        <!-- Mobile Sidebar Overlay -->
        <div class="sidebar-overlay" x-show="sidebarActive" x-transition.opacity @click="sidebarActive = false" x-cloak>
        </div>

        <div class="sidebar" id="chat-sidebar" :class="{ 'active': sidebarActive }">
            <div class="sidebar-header">
                <h4 class="mb-3">Characters</h4>
                <a :href="prefix + '/characters'" class="btn btn-sm w-100 manage-btn">Manage Characters</a>
            </div>
            <div class="character-list">
                <template x-for="char in characters" :key="char.id">
                    <div class="character-item" :class="{ 'active': currentCharacter?.id === char.id }"
                        @click="selectCharacter(char)">
                        <div class="d-flex align-items-center">
                            <template x-if="char.avatar">
                                <img :src="char.avatar"
                                    style="width:30px; height:30px; border-radius:50%; margin-right:10px; object-fit:cover; border: 1px solid var(--border-default);">
                            </template>
                            <template x-if="!char.avatar">
                                <div class="avatar-icon" x-text="char.name[0]"></div>
                            </template>
                            <div style="flex-grow:1; overflow:hidden;">
                                <span class="character-name" x-text="char.name"></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-header">

                <img x-show="currentCharacter?.avatar" :src="currentCharacter?.avatar ?? ''" id="character-avatar" />
                <div x-show="!currentCharacter?.avatar" class="avatar-icon"
                    x-text="currentCharacter?.name?.[0]?.toUpperCase() ?? '?'"></div>

                <div style="flex-grow:1;">
                    <p class="h5 m-0" x-text="currentCharacter ? currentCharacter.name : 'Select a character'"></p>
                </div>
                <button @click="clearHistory()" class="btn btn-sm btn-outline-danger" title="Clear History">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        viewBox="0 0 16 16">
                        <path
                            d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5Zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5Zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6Z" />
                        <path
                            d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1ZM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118ZM2.5 3h11V2h-11v1Z" />
                    </svg>
                </button>
            </div>

            <div id="chat-window" x-ref="chatWindow">
                <template x-for="(msg, index) in messages" :key="index">
                    <div class="message" :class="msg.role === 'user' ? 'user-message' : 'ai-message'">
                        <template x-if="msg.image">
                            <div class="mb-2 chat-img"><img :src="msg.image"></div>
                        </template>
                        <div class="content" x-html="renderMarkdown(msg.content)"></div>
                    </div>
                </template>
                <div class="message ai-message" x-show="isTyping">
                    <template x-if="typingReasoning">
                        <details class="reasoning-details mb-2" open>
                            <summary class="text-muted small" style="cursor:pointer">Thinking...</summary>
                            <div class="content text-muted small mt-1"
                                style="border-left: 2px solid #555; padding-left: 8px;"
                                x-html="renderMarkdown(typingReasoning)"></div>
                        </details>
                    </template>
                    <div class="content" x-show="typingMessage" x-html="renderMarkdown(typingMessage)"></div>
                    <div class="typing-indicator" x-show="!typingMessage && !typingReasoning">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            </div>

            <div x-show="selectedImage" id="image-preview-container" class="px-3 py-2"
                style="background: #16213e; border-top: 1px solid #0f3460;">
                <div class="position-relative d-inline-block">
                    <img id="image-preview" class="chat-img" :src="selectedImage">
                    <button @click="clearImage()"
                        class="btn btn-sm btn-danger position-absolute top-0 end-0 rounded-circle"
                        style="transform: translate(50%, -50%); padding: 0 6px;">&times;</button>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <label for="image-input" class="btn btn-link text-muted p-0 me-2 mb-0" style="cursor:pointer;">
                        <img src="public/icons/img.svg" alt="Image" width="24" height="24">
                        <input type="file" id="image-input" x-ref="imageInput" @change="handleImage" accept="image/*"
                            style="display:none;">
                    </label>
                    <textarea x-model="newMessage" class="message-input"
                        @keydown.enter.prevent="if(!$event.shiftKey && !$event.ctrlKey) sendMessage()"
                        placeholder="Type a message..." autocomplete="off" rows="1"
                        :style="`height: ${Math.min(newMessage.split('\n').length * 24 + 16, 200)}px`"></textarea>
                    <button class="send-button" @click="sendMessage()" :disabled="!currentCharacter || isTyping">
                        <img src="public/icons/send.svg" alt="Send" width="24" height="24">
                    </button>
                </div>
            </div>
        </div>
    </div>


    <!-- Profile Modal -->
    <div class="modal fade modal-cyber" id="profileModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Profile</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form @submit.prevent="updateProfile()">
                        <div class="mb-3">
                            <label class="form-label text-dim">Display Name</label>
                            <input type="text" x-model="profileForm.display_name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-dim">New Password (optional)</label>
                            <input type="password" x-model="profileForm.password" class="form-control"
                                placeholder="••••••••">
                            <small class="text-muted">Leave blank to keep current password</small>
                        </div>

                        <div x-show="profileMessage"
                            :class="profileMessage?.type === 'error' ? 'alert alert-danger' : 'alert alert-success'"
                            x-text="profileMessage?.text" style="display:none;" class="py-2 small"></div>

                        <button type="submit" class="btn btn-cyber mt-2" :disabled="profileLoading">
                            <span x-show="!profileLoading">Save Changes</span>
                            <span x-show="profileLoading">Processing...</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="public/app_userprofile.js?v=3"></script>
    <script src="public/app_chat.js?v=12"></script>
</body>

</html>
