<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Character Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease;
        }

        .btn-cyber {
            background: var(--accent-neon);
            color: #e0e3e5;
            border: none;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .btn-cyber:hover {
            box-shadow: 0 0 10px rgba(60, 173, 179, 0.5);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-neon);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }


        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h4 class="text-center mb-4">Authorization</h4>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="admin@chat.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div id="errorMessage" class="text-danger small mb-3" style="display:none;"></div>
            <button type="submit" class="btn btn-cyber">Login</button>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () {
            // Если уже залогинены (простая проверка сессии через localStorage)
            if (localStorage.getItem('user')) {
                window.location.href = '/chat';
            }

            $('#loginForm').on('submit', function (e) {
                e.preventDefault();
                const email = $('#email').val();
                const password = $('#password').val();
                const $error = $('#errorMessage');

                $error.hide();

                $.ajax({
                    url: '/api/login',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ email, password }),
                    success: function (response) {
                        if (response.success) {
                            localStorage.setItem('user', JSON.stringify(response.user));
                            window.location.href = '/chat';
                        }
                    },
                    error: function (err) {
                        const msg = err.responseJSON?.error || 'Login failed';
                        $error.text(msg).show();
                    }
                });
            });
        });
    </script>
</body>

</html>
