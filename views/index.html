<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Character Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/styles.css?v=6">
</head>

<body>
    <div class="login-card">
        <h4 class="text-center mb-4">Authorization</h4>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="admin@chat.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div id="errorMessage" class="text-danger small mb-3" style="display:none;"></div>
            <button type="submit" class="btn btn-cyber">Login</button>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () {
            // Если уже залогинены (простая проверка сессии через localStorage)
            if (localStorage.getItem('user')) {
                window.location.href = '/chat';
            }

            $('#loginForm').on('submit', function (e) {
                e.preventDefault();
                const email = $('#email').val();
                const password = $('#password').val();
                const $error = $('#errorMessage');

                $error.hide();

                $.ajax({
                    url: '/api/login',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ email, password }),
                    success: function (response) {
                        if (response.success) {
                            localStorage.setItem('user', JSON.stringify(response.user));
                            window.location.href = '/chat';
                        }
                    },
                    error: function (err) {
                        const msg = err.responseJSON?.error || 'Login failed';
                        $error.text(msg).show();
                    }
                });
            });
        });
    </script>
</body>

</html>
