<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Character Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="/public/styles.css?v=4">
</head>

<body>
    <div class="wrapper">
        <!-- Sidebar Toggle for Mobile -->
        <button id="sidebar-toggle" class="btn d-md-none position-absolute"
            style="top: 15px; left: 15px; z-index: 101; color: var(--accent-neon);">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd"
                    d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z" />
            </svg>
        </button>

        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span id="user-display-name">User</span>
                    <button onclick="logout()" class="btn btn-sm btn-link text-muted p-0 logout-btn">Logout</button>
                </div>
                <h4 class="mb-3">Characters</h4>
                <a href="/characters" class="btn btn-sm w-100 manage-btn">Manage Characters</a>
            </div>
            <div id="character-list" class="character-list">
                <!-- Character list populated by JS -->
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <img id="character-avatar"
                    src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'%3E%3C/svg%3E"
                    alt="">
                <div style="flex-grow:1;">
                    <h3 id="character-name" class="m-0">Select a character</h3>
                    <div id="character-status" style="font-size: 0.75rem; color: var(--text-dim);">Ready to chat</div>
                </div>
                <!-- ... clear button stays ... -->
                <button id="clear-history" class="btn btn-sm btn-outline-secondary" title="Clear History">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        class="bi bi-trash" viewBox="0 0 16 16">
                        <path
                            d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5Zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5Zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6Z" />
                        <path
                            d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1ZM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118ZM2.5 3h11V2h-11v1Z" />
                    </svg>
                </button>
            </div>

            <div id="chat-window">
                <!-- Сообщения будут тут -->
            </div>

            <div id="image-preview-container" class="px-3 py-2"
                style="display:none; background: #16213e; border-top: 1px solid #0f3460;">
                <div class="position-relative d-inline-block">
                    <img id="image-preview" class="chat-img" src="">
                    <button onclick="clearImageSelection()"
                        class="btn btn-sm btn-danger position-absolute top-0 end-0 rounded-circle"
                        style="transform: translate(50%, -50%); padding: 0 6px;">&times;</button>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <label for="image-input" class="btn btn-link text-muted p-0 me-2 mb-0" style="cursor:pointer;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                            class="bi bi-image" viewBox="0 0 16 16">
                            <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z" />
                            <path
                                d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2h-12zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1h12z" />
                        </svg>
                        <input type="file" id="image-input" accept="image/*" style="display:none;">
                    </label>
                    <textarea id="message-input" placeholder="Type a message..." autocomplete="off" rows="1"></textarea>
                    <button id="send-button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                            class="bi bi-send-fill" viewBox="0 0 16 16">
                            <path
                                d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083l6-15Zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471-.47 1.178Z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>



    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="/public/app.js"></script>
</body>

</html>
