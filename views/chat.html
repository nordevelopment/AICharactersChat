<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Character Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="/public/styles.css?v=6">
</head>

<body>
    <div class="wrapper" x-data="chatApp" x-cloak>
        <!-- Sidebar Toggle for Mobile -->
        <button id="sidebar-toggle" class="btn d-md-none position-absolute" @click="sidebarActive = !sidebarActive"
            style="top: 15px; left: 15px; z-index: 101; color: var(--accent-neon);">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd"
                    d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z" />
            </svg>
        </button>

        <div class="sidebar" :class="{ 'active': sidebarActive }" id="sidebar" @click.away="sidebarActive = false">
            <div class="sidebar-header">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span x-text="user.display_name">User</span>
                    <button @click="logout()" class="btn btn-sm btn-link text-muted p-0 logout-btn">Logout</button>
                </div>
                <h4 class="mb-3">Characters</h4>
                <a href="/characters" class="btn btn-sm w-100 manage-btn">Manage Characters</a>
            </div>
            <div class="character-list">
                <template x-for="char in characters" :key="char.id">
                    <div class="character-item" :class="{ 'active': currentCharacter?.id === char.id }"
                        @click="selectCharacter(char)">
                        <div class="d-flex align-items-center">
                            <template x-if="char.avatar">
                                <img :src="char.avatar"
                                    style="width:30px; height:30px; border-radius:50%; margin-right:10px; object-fit:cover;">
                            </template>
                            <template x-if="!char.avatar">
                                <div class="avatar-icon" x-text="char.name[0]"></div>
                            </template>
                            <div style="flex-grow:1; overflow:hidden;">
                                <span class="character-name" x-text="char.name"></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <img id="character-avatar" :src="currentCharacter ? getAvatar(currentCharacter) : ''" />
                <div style="flex-grow:1;">
                    <h3 class="m-0" x-text="currentCharacter ? currentCharacter.name : 'Select a character'"></h3>
                    <div style="font-size: 0.75rem; color: var(--text-dim);"
                        x-text="isTyping ? 'Writing...' : 'Ready to chat'"></div>
                </div>
                <button @click="clearHistory()" class="btn btn-sm btn-outline-danger" title="Clear History">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        viewBox="0 0 16 16">
                        <path
                            d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5Zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5Zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6Z" />
                        <path
                            d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1ZM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118ZM2.5 3h11V2h-11v1Z" />
                    </svg>
                </button>
            </div>

            <div id="chat-window" x-ref="chatWindow">
                <template x-for="(msg, index) in messages" :key="index">
                    <div class="message" :class="msg.role === 'user' ? 'user-message' : 'ai-message'">
                        <template x-if="msg.image">
                            <div class="mb-2 chat-img"><img :src="msg.image"></div>
                        </template>
                        <div class="content" x-html="renderMarkdown(msg.content)"></div>
                    </div>
                </template>
                <template x-if="isTyping && typingMessage">
                    <div class="message ai-message">
                        <div class="content" x-html="renderMarkdown(typingMessage)"></div>
                    </div>
                </template>
                <template x-if="isTyping && !typingMessage">
                    <div class="message ai-message typing-indicator">Typing...</div>
                </template>
            </div>

            <div x-show="selectedImage" id="image-preview-container" class="px-3 py-2"
                style="background: #16213e; border-top: 1px solid #0f3460;">
                <div class="position-relative d-inline-block">
                    <img id="image-preview" class="chat-img" :src="selectedImage">
                    <button @click="clearImage()"
                        class="btn btn-sm btn-danger position-absolute top-0 end-0 rounded-circle"
                        style="transform: translate(50%, -50%); padding: 0 6px;">&times;</button>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <label for="image-input" class="btn btn-link text-muted p-0 me-2 mb-0" style="cursor:pointer;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                            class="bi bi-image" viewBox="0 0 16 16">
                            <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z" />
                            <path
                                d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2h-12zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1h12z" />
                        </svg>
                        <input type="file" id="image-input" x-ref="imageInput" @change="handleImage" accept="image/*"
                            style="display:none;">
                    </label>
                    <textarea x-model="newMessage"
                        @keydown.enter.prevent="if(!$event.shiftKey && !$event.ctrlKey) sendMessage()"
                        placeholder="Type a message..." autocomplete="off" rows="1"
                        :style="`height: ${Math.min(newMessage.split('\n').length * 24 + 16, 200)}px`"></textarea>
                    <button @click="sendMessage()" :disabled="!currentCharacter || isTyping">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                            class="bi bi-send-fill" viewBox="0 0 16 16">
                            <path
                                d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083l6-15Zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471-.47 1.178Z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>



    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="/public/app_chat.js"></script>
</body>

</html>
