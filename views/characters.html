<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Characters - AI Character Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/styles.css?v=6">
</head>

<body>
    <div class="container py-2" x-data="characterManager" x-cloak>
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h3 class="m-0">Character Management</h3>
            <nav class="d-flex align-items-center">
                <span class="me-3" style="font-size: 0.9rem; color: #e94560;" x-text="user.display_name">User</span>
                <button @click="logout()" class="btn btn-sm btn-cyber me-4">Logout</button>
                <button class="btn btn-cyber" @click="prepareAdd()">+ Add New Character</button>
            </nav>
        </div>

        <div id="character-grid" class="row">
            <template x-for="char in characters" :key="char.slug">
                <div class="col-md-3">
                    <div class="character-card text-center">
                        <template x-if="char.avatar">
                            <img :src="char.avatar" class="avatar-preview">
                        </template>
                        <template x-if="!char.avatar">
                            <div class="avatar-preview" x-text="char.name[0]"></div>
                        </template>
                        <h3 x-text="char.name"></h3>
                        <p class="text-muted small">slug: <span x-text="char.slug"></span></p>
                        <div class="d-flex justify-content-center gap-2 mt-4">
                            <button class="btn btn-sm btn-outline-light" @click="prepareEdit(char)">Edit</button>
                            <button class="btn btn-sm btn-outline-danger"
                                @click="deleteCharacter(char.slug)">Delete</button>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div class="mt-2 pt-2 border-top border-secondary">
            <h4 class="mb-2">Global History Management</h4>
            <div class="card border-danger">
                <div class="card-body">
                    <h5 class="card-title text-danger">Danger Zone</h5>
                    <p class="card-text">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                        You can clear chat history for all characters. This action cannot be undone.
                        <button class="btn btn-outline-danger" @click="clearAllHistory()">Clear ALL History</button>
                    </p>
                </div>
            </div>
        </div>

        <!-- Modal for Add/Edit -->
        <div class="modal fade" id="characterModal" tabindex="-1" x-ref="charModal">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" x-text="form.slug ? 'Edit: ' + form.name : 'Add Character'"></h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="characterForm" class="needs-validation" novalidate
                            :class="{'was-validated': formInvalid}">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Name *</label>
                                    <input type="text" x-model="form.name" class="form-control" required minlength="2"
                                        placeholder="e.g. Natasha">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Avatar URL</label>
                                    <input type="text" x-model="form.avatar" class="form-control"
                                        placeholder="https://example.com/avatar.png">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">System Prompt (Personality)</label>
                                <textarea x-model="form.system_prompt" class="form-control" rows="3"
                                    placeholder="How should the character behave?"></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Scenario / Context</label>
                                <textarea x-model="form.scenario" class="form-control" rows="2"
                                    placeholder="Where are we? What is happening?"></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">First Message</label>
                                <input type="text" x-model="form.first_message" class="form-control"
                                    placeholder="Greeting from the AI">
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Temperature (0.1 - 2.0)</label>
                                    <input type="number" x-model="form.temperature" class="form-control" step="0.1"
                                        min="0.1" max="2.0">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Max Tokens</label>
                                    <input type="number" x-model="form.max_tokens" class="form-control">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Avatar Generation Prompt</label>
                                <input type="text" x-model="form.avatar_prompt" class="form-control"
                                    placeholder="Description for AI image generator">
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-cyber" @click="saveCharacter()">Save Character</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/public/app_characters.js?v=1"></script>
</body>

</html>
