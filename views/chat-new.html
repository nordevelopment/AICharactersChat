<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Characters</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root{
    --bg:#0a0f1c;
    --panel:#11182b;
    --border:rgba(255,255,255,0.06);
    --text:#e8ecf1;
    --dim:#8c96a7;
    --accent:#6c5cff;
}

/* BASE */
body{
    margin:0;
    background: radial-gradient(circle at top,#11182b,#0a0f1c 60%);
    color:var(--text);
    font-family:Inter,system-ui;
    height:100vh;
    overflow:hidden;
}

/* LAYOUT */
.layout{
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:var(--panel);
    border-right:1px solid var(--border);
    padding:15px;
    overflow:auto;
}

.sidebar h6{
    color:var(--dim);
    font-size:12px;
    text-transform:uppercase;
}

.char{
    padding:10px;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
}

.char:hover{
    background:rgba(255,255,255,0.05);
}

.char.active{
    background:rgba(108,92,255,0.15);
}

/* CHAT AREA */
.chat{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* HEADER */
.chat-header{
    padding:14px 20px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    gap:10px;
}

.avatar{
    width:36px;
    height:36px;
    border-radius:10px;
    background:#1a2238;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* WINDOW */
.chat-window{
    flex:1;
    overflow:auto;
    padding:25px;
}

/* MESSAGE */
.msg{
    max-width:720px;
    margin-bottom:18px;
}

.msg.user{
    margin-left:auto;
    text-align:right;
}

.bubble{
    display:inline-block;
    padding:12px 14px;
    border-radius:14px;
    font-size:14px;
    line-height:1.6;
}

.user .bubble{
    background:linear-gradient(135deg,#6c5cff,#8a7dff);
    color:white;
}

.ai .bubble{
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border);
}

/* INPUT */
.chat-input{
    padding:15px;
    border-top:1px solid var(--border);
}

.input-box{
    display:flex;
    gap:10px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:10px;
}

textarea{
    flex:1;
    border:none;
    background:none;
    color:white;
    resize:none;
    outline:none;
}

.send{
    background:var(--accent);
    border:none;
    border-radius:10px;
    padding:8px 14px;
    color:white;
}

/* TYPING */
.typing{
    font-size:13px;
    color:var(--dim);
}
</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
    <h6>Characters</h6>

    <div class="char active">Vampire Queen</div>
    <div class="char">AI Overlord</div>
    <div class="char">Cyber Girl</div>

</div>

<!-- CHAT -->
<div class="chat">

    <div class="chat-header">
        <div class="avatar">V</div>
        <strong>Vampire Queen</strong>
    </div>

    <div class="chat-window" id="chat">

        <div class="msg ai">
            <div class="bubble">
                You entered my domain…
            </div>
        </div>

        <div class="msg user">
            <div class="bubble">
                Who are you?
            </div>
        </div>

        <div class="msg ai">
            <div class="bubble">
                Someone you should not have summoned.
            </div>
        </div>

        <div class="typing">AI is typing...</div>

    </div>

    <div class="chat-input">
        <div class="input-box">
            <textarea placeholder="Type your message..."></textarea>
            <button class="send">→</button>
        </div>
    </div>

</div>

</div>

</body>
</html>
